# Configuração Nixpacks para o Railway (VittaHub backend)
# Instala bibliotecas de sistema necessárias para o Chromium/Puppeteer rodar
[phases.setup]
nixPkgs = ["nodejs", "...", "chromium"]
aptPkgs = [
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2",
  "libatspi2.0-0"
]
