# Configuração Nixpacks para o Railway (VittaHub backend)
# Instala bibliotecas de sistema necessárias para o Chromium/Puppeteer rodar
[phases.setup]
nixPkgs = ["nodejs", "...", "chromium"]
aptPkgs = [
  "libnspr4",
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2",
  "libatspi2.0-0",
  "libxshmfence1",
  "libx11-6",
  "libxcb1",
  "libxext6",
  "libxi6",
  "libxtst6",
  "fonts-liberation",
  "libappindicator3-1",
  "libdbus-1-3"
]
