name: Build & push frontend image

# Builda a imagem do frontend no GitHub Actions (com cache persistente) e publica
# no GitHub Container Registry (ghcr.io). O Railway então só PUXA a imagem pronta,
# tornando o deploy questão de segundos em vez de buildar do zero a cada push.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-image.yml'
  workflow_dispatch: {}   # permite rodar manualmente pela aba Actions

concurrency:
  group: frontend-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vittahub-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necessário para publicar no ghcr.io do próprio owner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push (com cache do GitHub Actions)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Redeploy automático no Railway (OPCIONAL) ──────────────────────────────
      # Só roda se você cadastrar os secrets RAILWAY_TOKEN e RAILWAY_SERVICE_ID no
      # repositório (Settings → Secrets and variables → Actions). Sem eles, o passo
      # é pulado e a imagem fica publicada pra o Railway puxar no próximo deploy.
      - name: Checar config do Railway
        id: rw
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ -n "$RAILWAY_TOKEN" ] && [ -n "$RAILWAY_SERVICE_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Redeploy no Railway (opcional)
        if: ${{ steps.rw.outputs.enabled == 'true' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm i -g @railway/cli
          railway redeploy --service "${{ secrets.RAILWAY_SERVICE_ID }}" --yes

      - name: Resumo
        run: |
          echo "### ✅ Imagem publicada" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${IMAGE}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${IMAGE}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
